name: Build Windows exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_NAME: POE-Sniper
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "${{ env.APP_NAME }}-${{ env.VERSION }}" `
            --icon "assets/poe-sniper.ico" `
            --collect-all selenium `
            --collect-all webdriver_manager `
            main.py

      - name: Zip artifact
        run: |
          cd dist
          $exe = "${{ env.APP_NAME }}-${{ env.VERSION }}.exe"
          $zip = "${{ env.APP_NAME }}-${{ env.VERSION }}-win.zip"
          Compress-Archive -Path $exe -DestinationPath $zip

      - name: Upload artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-win
          path: dist/${{ env.APP_NAME }}-${{ env.VERSION }}-win.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ env.APP_NAME }}-${{ env.VERSION }}-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}