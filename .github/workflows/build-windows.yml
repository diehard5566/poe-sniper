name: Build Windows exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --windowed --onefile --name "POE-Sniper" --icon "assets/poe-sniper.ico" --collect-all selenium --collect-all webdriver_manager main.py

      - name: Zip artifact
        run: |
          cd dist
          powershell Compress-Archive -Path POE-Sniper.exe -DestinationPath POE-Sniper-win.zip

      - name: Upload artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: POE-Sniper-win
          path: dist/POE-Sniper-win.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/POE-Sniper-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}